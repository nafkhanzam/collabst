services:
  postgres:
    image: postgres:18
    container_name: collabst-dev-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: collabst
    volumes:
      - postgres_dev_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: collabst-dev-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: collabst-dev-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: collabst-dev-backend
    volumes:
      - ../../backend:/app:z
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/collabst
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_URL}
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE}
      MINIO_BUCKET_NAME: collabst
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      WEB_URL: ${WEB_URL}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED}
      API_V1_STR: ${API_V1_STR}
      ENVIRONMENT: development
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: collabst-dev-frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ../../frontend:/app:z
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WEB_URL=${WEB_URL}
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:
